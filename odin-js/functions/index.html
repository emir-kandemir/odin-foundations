<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Functions</title>
  </head>
  <body>
    <script>
      // Takes number adds 7 to that number and returns it.
      function add7(number) {
        return number + 7;
      }

      //   Takes two numbers, multiplies them together and returns it.
      function multiply(number1, number2) {
        return number1 * number2;
      }

      // Takes a string and capitalize to first letter and lowers to other letters besides first.
      function capitalize(string) {
        let strInd = string.charAt(0);
        let capitalized = strInd.toUpperCase();
        let restOfString = string.slice(1).toLowerCase();
        return capitalized + restOfString;
      }

      //   Takes a string and returns the last letter of that string.
      function lastLetter(string) {
        let strInd = string.at(-1);
        return strInd;
      }
    </script>
  </body>
</html>
